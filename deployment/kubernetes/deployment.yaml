apiVersion: v1
kind: ConfigMap
metadata:
  name: casetool-config
  namespace: casetool
data:
  DATABASE_HOST: "postgres"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "casetool_db"
  DEBUG: "False"
  ENVIRONMENT: "production"
---
apiVersion: v1
kind: Secret
metadata:
  name: casetool-secrets
  namespace: casetool
type: Opaque
stringData:
  DATABASE_USER: casetool
  DATABASE_PASSWORD: changeme
  SECRET_KEY: your-production-secret-key-here
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: casetool-backend
  namespace: casetool
spec:
  replicas: 3
  selector:
    matchLabels:
      app: casetool-backend
  template:
    metadata:
      labels:
        app: casetool-backend
    spec:
      containers:
      - name: backend
        image: casetool-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql://$(DB_USER):$(DB_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/$(DATABASE_NAME)"
        envFrom:
        - configMapRef:
            name: casetool-config
        - secretRef:
            name: casetool-secrets
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: casetool-backend
  namespace: casetool
spec:
  selector:
    app: casetool-backend
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: casetool-frontend
  namespace: casetool
spec:
  replicas: 2
  selector:
    matchLabels:
      app: casetool-frontend
  template:
    metadata:
      labels:
        app: casetool-frontend
    spec:
      containers:
      - name: frontend
        image: casetool-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: casetool-frontend
  namespace: casetool
spec:
  selector:
    app: casetool-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: LoadBalancer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: casetool-ingress
  namespace: casetool
spec:
  ingressClassName: nginx
  rules:
  - host: casetool.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: casetool-backend
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: casetool-frontend
            port:
              number: 80
